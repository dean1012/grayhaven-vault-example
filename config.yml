---
certificate:
  environment: staging
  email: admin@example.com
discord_webhook: testing

network:
  vpc_cidr: 10.20.0.0/16

backup:
  repositories:
    local:
      repository_path: /var/backups/restic
      homedir_archive_path: /var/backups/deleted-homedir-archives
    remote:
      provider: gcs
      project_id: grayhaven
      location: US
      storage_class: STANDARD
  schedule: daily
  retention:
    keep_daily: 7
  include:
    - /home
    - /var/log
  exclude: []

observability:
  grafana_cloud:
    enabled: false
    logs_enabled: false

timetracker:
  hostname: timetracker.staging.grayhavensystems.com
  image_digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  data_dir: /var/lib/grayhaven/timetracker/data
  branding_dir: /var/lib/grayhaven/timetracker/branding
  secrets_dir: /var/lib/grayhaven/timetracker/secrets
  backup_dir: /var/lib/grayhaven/timetracker/backups
  backup_retention_days: 14

backupctl_repo_url: https://github.com/dean1012/grayhaven-backupctl.git
backupctl_repo_ref: main
backupctl_checkout_dir: /home/ansible/grayhaven-backupctl
