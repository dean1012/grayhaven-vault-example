---
certificate_environment: staging
discord_webhook: testing

backup:
  repositories:
    local:
      repository_path: /var/backups/restic
      homedir_archive_path: /var/backups/deleted-homedir-archives
    remote:
      provider: gcs
      project_id: grayhaven
      location: US
      storage_class: STANDARD
  schedule: daily
  retention:
    keep_daily: 7
  include:
    - /home
    - /var/log
  exclude: []

observability:
  grafana_cloud:
    enabled: true
    logs_enabled: true

managed_baseline_backupctl_repo_url: https://github.com/dean1012/grayhaven-backupctl.git
managed_baseline_backupctl_repo_ref: main
managed_baseline_backupctl_checkout_dir: /home/ansible/grayhaven-backupctl
